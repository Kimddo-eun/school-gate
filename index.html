<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대학 정문 아카이브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- LOADING -->
  <div id="loader">
    <div class="ld-title">대학 정문 아카이브</div>
    <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
    <div class="ld-msg" id="ld-msg">데이터 불러오는 중…</div>
  </div>

  <!-- HEADER -->
  <div id="hdr">
    <div id="hdr-left">
      <div id="hdr-title">대학 정문 아카이브</div>
      <div id="hdr-sub">UNIVERSITY GATE ARCHIVE — REPUBLIC OF KOREA</div>
    </div>
    <div id="time-ctrl">
      <div id="tc-status"></div>
      <div class="tc-row">
        <span id="tc-label">실제 시간</span>
        <input type="range" id="tc-slider" min="0" max="1439" step="30">
        <button id="tc-reset">초기화</button>
      </div>
    </div>
    <div id="count-badge"></div>
  </div>

  <!-- STAGE (지도 대신 커스텀 줌/팬) -->
  <div id="stage-wrap">
    <div id="stage"></div>
  </div>

  <!-- MODAL -->
  <div id="overlay">
    <div id="modal">
      <button id="m-close">×</button>
      <div id="m-img-wrap">
        <img id="m-img" src="" alt="">
        <div id="m-img-none">이미지 없음</div>
      </div>
      <div id="m-body">
        <div id="m-name"></div>
        <div id="m-loc"></div>
        <div id="m-tags"></div>
        <div id="m-grid"></div>
      </div>
    </div>
  </div>

  <!-- 시간 제한 안내 -->
  <div id="blocked-overlay">
    <div id="blocked-card">
      <button id="blocked-close">×</button>
      <div class="bl-icon">🚪</div>
      <div id="bl-name"></div>
      <div class="bl-msg">현재는 입장 할 수 없는 시간입니다</div>
      <div id="bl-hours" class="bl-hours"></div>
    </div>
  </div>

  <script src="js/coords.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
