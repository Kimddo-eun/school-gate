<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대학 정문 아카이브</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- LOADING -->
  <div id="loader">
    <div class="ld-title">대학 정문 아카이브</div>
    <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
    <div class="ld-msg" id="ld-msg">데이터 불러오는 중…</div>
  </div>

  <!-- HEADER -->
  <div id="hdr">
    <div id="hdr-left">
      <div id="hdr-title">대학 정문 아카이브</div>
      <div id="hdr-sub">UNIVERSITY GATE ARCHIVE — REPUBLIC OF KOREA</div>
    </div>
    <div id="count-badge"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- MODAL -->
  <div id="overlay">
    <div id="modal">
      <button id="m-close">×</button>
      <div id="m-img-wrap">
        <img id="m-img" src="" alt="">
        <div id="m-img-none">이미지 없음</div>
      </div>
      <div id="m-body">
        <div id="m-name"></div>
        <div id="m-loc"></div>
        <div id="m-tags"></div>
        <div id="m-grid"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/coords.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
